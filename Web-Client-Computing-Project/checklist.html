<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist - Find Your Wave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Find Your Wave</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="team.html">Team</a></li>
      <li><a href="game.html">Game</a></li>
      <li><a href="form.html">Find My Wave</a></li>
      <li><a href="checklist.html" class="active">Checklist</a></li>
    </ul>
    <button class="hamburger" aria-label="메뉴 열기">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Hero -->
  <section class="checklist-hero">
    <p class="section-tag">Travel Checklist</p>
    <h1 class="section-title">해변 여행 준비물 체크리스트</h1>
    <p class="section-desc">나에게 맞는 인생 해변을 찾았다면, 이제 여행을 떠나기 전 준비물을 체크해보세요!</p>
  </section>

  <!-- Checklist -->
  <div class="checklist-container">

    <!-- Theme Picker -->
    <section class="theme-picker">
      <h2>여행 테마를 선택하세요</h2>
      <p class="theme-picker-desc">테마에 맞는 기본 준비물 목록이 자동으로 생성됩니다.</p>
      <div class="theme-grid" id="themeGrid">
        <button type="button" class="theme-card" data-theme="beginner">
          <div class="theme-card-icon">&#127940;</div>
          <div class="theme-card-title">서핑 초보자용</div>
          <div class="theme-card-sub">첫 서핑을 떠나는 당신을 위한 필수템</div>
        </button>
        <button type="button" class="theme-card" data-theme="healing">
          <div class="theme-card-icon">&#127774;</div>
          <div class="theme-card-title">해변 힐링용</div>
          <div class="theme-card-sub">여유로운 시간을 위한 휴식 아이템</div>
        </button>
        <button type="button" class="theme-card" data-theme="advanced">
          <div class="theme-card-icon">&#127754;</div>
          <div class="theme-card-title">서핑 고수용</div>
          <div class="theme-card-sub">진심으로 파도를 타는 사람을 위한 장비</div>
        </button>
        <button type="button" class="theme-card" data-theme="party">
          <div class="theme-card-icon">&#127881;</div>
          <div class="theme-card-title">비치 파티용</div>
          <div class="theme-card-sub">친구들과 함께라면 더 즐거운 준비물</div>
        </button>
      </div>
    </section>

    <!-- Checklist Panel -->
    <section class="checklist-panel" id="checklistPanel">
      <div class="checklist-header">
        <h2 class="checklist-title" id="checklistTitle">준비물 목록</h2>
        <span class="checklist-progress" id="checklistProgress">0 / 0 완료</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="progressBarFill"></div>
      </div>

      <ul class="checklist-items" id="checklistItems"></ul>

      <div class="checklist-add">
        <input type="text" id="itemInput" placeholder="나만의 준비물을 추가해보세요" maxlength="40">
        <button type="button" id="addItemBtn">추가</button>
      </div>

      <div class="checklist-actions">
        <button type="button" class="checklist-action-btn" id="clearCheckedBtn">완료 항목 지우기</button>
        <button type="button" class="checklist-action-btn" id="resetThemeBtn">테마 초기화</button>
      </div>
    </section>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-logo">Find Your Wave</p>
    <p class="footer-text">2026 Web Client Computing Team Project</p>
  </footer>

  <script src="js/checklist.js"></script>
  <script>
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelector('.nav-links');
    hamburger.addEventListener('click', function () {
      hamburger.classList.toggle('active');
      navLinks.classList.toggle('open');
    });
    document.querySelectorAll('.nav-links a').forEach(function (link) {
      link.addEventListener('click', function () {
        hamburger.classList.remove('active');
        navLinks.classList.remove('open');
      });
    });
  </script>

</body>
</html>
