<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Wave | 대한민국 서핑 가이드</title>
  <link rel="stylesheet" href="../assets/css/form.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">Find Your Wave</a>
    <nav class="nav-links" aria-label="주요 메뉴">
      <a href="team.html">Team</a>
      <a href="game.html">Game</a>
      <a class="active" href="form.html">Find</a>
      <a href="checklist.html">Checklist</a>
    </nav>
  </header>

  <main class="shell">
    <section class="page-title">
      <p class="eyebrow">나만의 파도 찾기</p>
      <p>Find My Wave</p>
      <p>몇 가지 취향을 고르면 오늘의 여행 스타일과 어울리는 해변을 추천해드려요.</p>

    </section>

    <section class="form-panel" aria-label="나만의 파도 찾기 테스트">
      <div class="step-status">
        <span id="step-label">Step 1 / 3</span>
        <div class="step-progress" aria-label="진행률"><span id="step-progress-bar"></span></div>
      </div>

      <div class="question is-active" data-question="mood">
        <p class="question-kicker">Travel Mood</p>
        <h2>이번 여행에서 가장 원하는 분위기는?</h2>
        <div class="choice-grid">
          <button class="choice-card" data-value="active" type="button">
            <strong>액티브</strong>
            <span>파도, 액티비티, 새로운 경험</span>
          </button>
          <button class="choice-card" data-value="healing" type="button">
            <strong>힐링</strong>
            <span>산책, 풍경, 조용한 휴식</span>
          </button>
          <button class="choice-card" data-value="social" type="button">
            <strong>소셜</strong>
            <span>강습, 핫플, 사람들과 함께</span>
          </button>
        </div>
      </div>

      <div class="question" data-question="skill">
        <p class="question-kicker">Surf Level</p>
        <h2>서핑 경험은 어느 정도인가요?</h2>
        <div class="choice-grid">
          <button class="choice-card" data-value="beginner" type="button">
            <strong>처음이에요</strong>
            <span>강습과 안전한 파도가 중요해요</span>
          </button>
          <button class="choice-card" data-value="middle" type="button">
            <strong>몇 번 타봤어요</strong>
            <span>적당한 파도와 분위기를 원해요</span>
          </button>
          <button class="choice-card" data-value="challenge" type="button">
            <strong>도전하고 싶어요</strong>
            <span>강한 파도와 유명 스팟 선호</span>
          </button>
        </div>
      </div>

      <div class="question" data-question="place">
        <p class="question-kicker">Beach Style</p>
        <h2>선호하는 해변 환경은?</h2>
        <div class="choice-grid">
          <button class="choice-card" data-value="city" type="button">
            <strong>도심형</strong>
            <span>접근성과 편의시설이 좋아야 해요</span>
          </button>
          <button class="choice-card" data-value="nature" type="button">
            <strong>자연형</strong>
            <span>풍경과 여유가 가장 중요해요</span>
          </button>
          <button class="choice-card" data-value="hotspot" type="button">
            <strong>핫스팟</strong>
            <span>유명한 서핑 명소를 가보고 싶어요</span>
          </button>
        </div>
      </div>

      <div class="form-actions">
        <button class="secondary-btn" id="prev-btn" type="button">이전</button>
        <button class="small-btn" id="next-btn" type="button" disabled>다음</button>
      </div>

      <article class="result-card" id="result-card" hidden>
        <p class="result-kicker">Your Wave Report</p>
        <h2 id="result-title"></h2>
        <p id="result-desc"></p>
        <div class="keyword-row" id="keyword-row"></div>
        <div class="spot-grid" id="spot-grid"></div>
        <div class="result-actions">
          <a class="small-btn" href="checklist.html">체크리스트로 이동</a>
          <button class="secondary-btn" id="restart-test-btn" type="button">다시 선택하기</button>
        </div>
      </article>
    </section>
  </main>

  <script src="../assets/js/form.js"></script>
</body>
</html>
