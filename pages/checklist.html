<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist | 대한민국 서핑 가이드</title>
  <link rel="stylesheet" href="../assets/css/checklist.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">Find Your Wave</a>
    <nav class="nav-links" aria-label="주요 메뉴">
      <a href="team.html">Team</a>
      <a href="game.html">Game</a>
      <a href="form.html">Find</a>
      <a class="active" href="checklist.html">Checklist</a>
    </nav>
  </header>

  <main class="shell checklist-shell">
    <section class="packing-hero">
      <div>
        <p class="eyebrow">바다 가기 전 체크하기</p>
        <h1>Checklist</h1>
        <p>떠나기 전, 빠뜨린 준비물이 없는지 여행 모드에 맞춰 확인해보세요.</p>
      </div>
      <div class="hero-badge" aria-hidden="true">wave ready</div>
    </section>

    <section class="mode-section" aria-label="여행 모드 선택">
      <button class="theme-btn is-selected" data-theme="surf" type="button">
        <span class="mode-icon">Surf</span>
        <strong>서핑 데이</strong>
        <em>파도를 탈 준비</em>
      </button>
      <button class="theme-btn" data-theme="healing" type="button">
        <span class="mode-icon">Rest</span>
        <strong>힐링 비치</strong>
        <em>쉬어가는 하루</em>
      </button>
      <button class="theme-btn" data-theme="overnight" type="button">
        <span class="mode-icon">Stay</span>
        <strong>1박 여행</strong>
        <em>가볍게 떠나는 바다</em>
      </button>
    </section>

    <section class="check-panel">
      <div class="check-panel-head">
        <div>
          <p class="eyebrow">Today Status</p>
          <h2 id="theme-title">서핑 데이</h2>
        </div>
        <p class="progress-count" id="progress-count">0 / 0 완료</p>
      </div>

      <p class="status-message" id="status-message">천천히 챙겨볼까요?</p>
      <div class="complete-banner" id="complete-banner" aria-live="polite" hidden>
        <strong>준비 완료</strong>
        <span>완벽해요. 이제 바다로 떠나요.</span>
      </div>
      <div class="progress" aria-label="체크 진행률"><span id="progress-bar"></span></div>

      <ul class="check-list" id="check-list"></ul>

      <div class="add-row">
        <input id="new-item" type="text" placeholder="내 준비물 추가">
        <button class="small-btn" id="add-btn" type="button">추가</button>
      </div>
      <div class="panel-actions">
        <button class="small-btn danger-btn" id="clear-done" type="button">완료 항목 정리</button>
        <button class="small-btn reset-btn" id="reset-btn" type="button">처음으로</button>
      </div>
    </section>
    <div class="confetti-layer" id="confetti-layer" aria-hidden="true"></div>
  </main>

  <script src="../assets/js/checklist.js"></script>
</body>
</html>
